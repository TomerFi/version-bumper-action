---
name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    paths:
      - '.dist/**'
      - 'action.js'
      - 'action.yml'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    name: Lint action and workflows
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1
        with:
          actionlint_flags: -shellcheck= -pyflakes=

  test:
    needs: actionlint
    uses: ./.github/workflows/test_action.yml
